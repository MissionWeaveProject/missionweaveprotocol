name: Protocol validation

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: protocol-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-policy:
    name: Repository policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/check_repository_policy.py

  protocol-artifacts:
    name: Schemas and conformance vectors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-validation.txt
      - run: python -m pip install -r requirements-validation.txt
      - run: python scripts/validate_protocol.py

  cryptography-artifacts:
    name: Signed-document cryptography vectors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12.13"
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.21"
          enable-cache: true
          cache-dependency-glob: requirements-cryptography.lock
      - run: >-
          uv pip compile requirements-cryptography.txt
          --universal
          --python-version 3.12.13
          --generate-hashes
          --exclude-newer 2026-07-18T08:42:20Z
          --custom-compile-command
          "uv pip compile requirements-cryptography.txt --universal --python-version 3.12.13 --generate-hashes --exclude-newer 2026-07-18T08:42:20Z --output-file requirements-cryptography.lock  # uv 0.11.21"
          --output-file requirements-cryptography.lock
      - run: git diff --exit-code -- requirements-cryptography.lock
      - run: >-
          uv pip install --system --require-hashes --no-deps --only-binary :all: --strict
          --requirements requirements-cryptography.lock
      - run: python scripts/generate_crypto_vectors.py
      - run: |
          git status --porcelain=v1 --untracked-files=all > /tmp/generated-artifact-status
          sed -n '1,200p' /tmp/generated-artifact-status
          test ! -s /tmp/generated-artifact-status
      - run: python scripts/validate_crypto_vectors.py
